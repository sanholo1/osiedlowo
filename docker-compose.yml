services:
  mysql:
    image: mysql:8.0
    container_name: osiedlowo_mysql
    # Wymuszamy natywne hasła, aby Workbench i starsze biblioteki nie miały problemów z połączeniem
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: osiedlowo_db
      MYSQL_USER: osiedlowo_user
      MYSQL_PASSWORD: osiedlowo_password
    ports:
      - "3307:3306" # Łączysz się przez Workbench na localhost:3307
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - osiedlowo_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=root_password"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: osiedlowo_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: osiedlowo_user
      DB_PASSWORD: osiedlowo_password
      DB_DATABASE: osiedlowo_db
      JWT_SECRET: your_jwt_secret_key_change_in_production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy # Backend czeka, aż baza przejdzie healthcheck
    volumes:
      - ./backend:/app
      - /app/node_modules # Chroni moduły wewnątrz kontenera przed nadpisaniem przez puste foldery z Windowsa
    networks:
      - osiedlowo_network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: osiedlowo_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:3001
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - osiedlowo_network

volumes:
  mysql_data:
    driver: local

networks:
  osiedlowo_network:
    driver: bridge
